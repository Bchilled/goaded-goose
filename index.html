<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Goaded Goose — MTG Singles Canada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0e;
  --ink2:#1a1a1b;
  --ink3:#2a2a2c;
  --muted:#6b6b70;
  --dim:#3a3a3e;
  --line:#2a2a2e;
  --gold:#c9a84c;
  --gold2:#e8c97e;
  --gold-bg:rgba(201,168,76,0.08);
  --white:#f5f4f0;
  --white2:#e8e7e2;
  --rare:#5b8dd9;
  --uncommon:#7dbf8c;
  --common:#aaaaaa;
  --mythic:#e07b4a;
  --r:4px;
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:rgba(13,13,14,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:20px;height:56px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--gold);text-decoration:none;flex-shrink:0}
.logo span{color:var(--white);opacity:.7}
.search-wrap{flex:1;max-width:500px;position:relative}
.search-wrap input{width:100%;background:var(--ink2);border:1px solid var(--line);border-radius:var(--r);padding:8px 14px 8px 38px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--gold)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.cart-btn{display:flex;align-items:center;gap:8px;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r);padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s}
.cart-btn:hover{background:var(--gold2)}
.cart-count{background:var(--ink);color:var(--gold);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}

/* ── HERO ── */
.hero{border-bottom:1px solid var(--line);padding:48px 24px;max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
.hero-text h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,7vw,96px);line-height:.95;letter-spacing:1px;color:var(--white);margin-bottom:16px}
.hero-text h1 em{color:var(--gold);font-style:normal;display:block}
.hero-text p{color:var(--muted);font-size:16px;max-width:380px;margin-bottom:28px;font-weight:300}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{background:var(--gold);color:var(--ink);border:none;border-radius:var(--r);padding:12px 24px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--white2);border:1px solid var(--line);border-radius:var(--r);padding:12px 24px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.hero-stat{background:var(--ink2);padding:24px 20px;text-align:center}
.hero-stat-num{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--gold);line-height:1}
.hero-stat-label{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.5px;text-transform:uppercase}

/* ── SECTION ── */
.section{max-width:1400px;margin:0 auto;padding:48px 24px}
.section-header{display:flex;align-items:baseline;gap:16px;margin-bottom:28px;border-bottom:1px solid var(--line);padding-bottom:16px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.5px;color:var(--white)}
.section-sub{font-size:13px;color:var(--muted);margin-left:auto}
.see-all{font-size:13px;color:var(--gold);text-decoration:none;cursor:pointer}
.see-all:hover{color:var(--gold2)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.filter-chip{background:var(--ink2);border:1px solid var(--line);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.filter-chip:hover{border-color:var(--gold);color:var(--gold)}
.filter-chip.active{background:var(--gold-bg);border-color:var(--gold);color:var(--gold)}
.filter-select{background:var(--ink2);border:1px solid var(--line);border-radius:var(--r);padding:6px 12px;color:var(--white2);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--gold)}
.results-count{font-size:13px;color:var(--muted);margin-left:auto}

/* ── CARD GRID ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}

/* ── CARD ── */
.card{background:var(--ink2);border:1px solid var(--line);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;position:relative}
.card:hover{border-color:var(--gold);transform:translateY(-2px)}
.card-img-wrap{position:relative;background:var(--ink3);aspect-ratio:5/7;overflow:hidden}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .card-img-wrap img{transform:scale(1.03)}
.card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:32px}
.card-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.badge-mythic{background:rgba(224,123,74,.2);color:var(--mythic);border:1px solid rgba(224,123,74,.4)}
.badge-rare{background:rgba(91,141,217,.2);color:var(--rare);border:1px solid rgba(91,141,217,.4)}
.badge-uncommon{background:rgba(125,191,140,.2);color:var(--uncommon);border:1px solid rgba(125,191,140,.4)}
.badge-common{background:rgba(170,170,170,.1);color:var(--common);border:1px solid rgba(170,170,170,.2)}
.card-foil-badge{position:absolute;top:8px;left:8px;background:linear-gradient(135deg,#c9a84c,#e8c97e,#c9a84c);color:var(--ink);font-size:9px;font-weight:500;padding:2px 7px;border-radius:20px;letter-spacing:.5px}
.card-body{padding:10px 12px}
.card-set{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px;margin-bottom:3px}
.card-name{font-size:13px;font-weight:500;color:var(--white);line-height:1.3;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-type{font-size:11px;color:var(--muted);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-price{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:.5px}
.card-price span{font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif;letter-spacing:0;font-weight:300}
.card-qty{font-size:11px;color:var(--muted)}
.add-btn{background:transparent;border:1px solid var(--line);border-radius:var(--r);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;transition:all .15s;flex-shrink:0}
.add-btn:hover{background:var(--gold);border-color:var(--gold);color:var(--ink)}

/* ── SET GRID ── */
.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.set-chip{background:var(--ink2);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .2s}
.set-chip:hover,.set-chip.active{border-color:var(--gold);background:var(--gold-bg)}
.set-code{font-family:'DM Mono',monospace;font-size:18px;font-weight:400;color:var(--gold);margin-bottom:4px}
.set-name{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.set-count{font-size:11px;color:var(--dim);margin-top:2px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--ink2);border:1px solid var(--line);border-radius:12px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:var(--ink3);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:18px;transition:all .15s}
.modal-close:hover{background:var(--line);color:var(--white)}
.modal-inner{display:grid;grid-template-columns:1fr 1.2fr;gap:0}
.modal-img{background:var(--ink3);padding:24px;display:flex;align-items:center;justify-content:center;border-radius:12px 0 0 12px}
.modal-img img{max-width:100%;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-details{padding:28px 24px}
.modal-set{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px;margin-bottom:6px}
.modal-name{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.5px;line-height:1;margin-bottom:4px}
.modal-type{font-size:13px;color:var(--muted);margin-bottom:20px}
.modal-price-row{display:flex;align-items:baseline;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--line)}
.modal-price{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--gold);line-height:1}
.modal-price-label{font-size:13px;color:var(--muted)}
.modal-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.meta-item label{font-size:11px;color:var(--muted);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.meta-item span{font-size:14px;color:var(--white2)}
.modal-formats{margin-bottom:20px}
.modal-formats label{font-size:11px;color:var(--muted);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.format-chips{display:flex;flex-wrap:wrap;gap:4px}
.format-chip{background:var(--ink3);border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--muted)}
.modal-actions{display:flex;gap:8px}
.qty-control{display:flex;align-items:center;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.qty-control button{background:var(--ink3);border:none;color:var(--white);width:32px;height:40px;cursor:pointer;font-size:16px;transition:background .15s}
.qty-control button:hover{background:var(--line)}
.qty-control span{padding:0 14px;font-size:14px;min-width:40px;text-align:center;display:flex;align-items:center;justify-content:center}
.modal-add{flex:1;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r);padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s}
.modal-add:hover{background:var(--gold2)}

/* ── CART DRAWER ── */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;display:none}
.cart-overlay.open{display:block}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:360px;background:var(--ink2);border-left:1px solid var(--line);z-index:151;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s}
.cart-drawer.open{transform:translateX(0)}
.cart-head{padding:20px 20px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.cart-head h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.5px}
.cart-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px}
.cart-close:hover{color:var(--white)}
.cart-items{flex:1;overflow-y:auto;padding:16px 20px}
.cart-item{display:flex;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.cart-item:last-child{border-bottom:none}
.cart-item-img{width:44px;height:62px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--ink3)}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cart-item-set{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px}
.cart-item-row{display:flex;align-items:center;justify-content:space-between}
.cart-item-price{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold)}
.cart-item-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px}
.cart-item-remove:hover{color:#e24b4a}
.cart-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.cart-empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.cart-foot{padding:16px 20px;border-top:1px solid var(--line)}
.cart-total-row{display:flex;justify-content:space-between;margin-bottom:16px}
.cart-total-label{font-size:14px;color:var(--muted)}
.cart-total-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold)}
.checkout-btn{width:100%;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r);padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:background .2s}
.checkout-btn:hover{background:var(--gold2)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink2);border:1px solid var(--gold);border-radius:var(--r);padding:12px 20px;font-size:14px;color:var(--gold);z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* ── LOAD MORE ── */
.load-wrap{text-align:center;padding:32px 0}

/* ── NO RESULTS ── */
.no-results{text-align:center;padding:60px 24px;color:var(--muted)}
.no-results h3{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--dim);margin-bottom:8px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .hero{grid-template-columns:1fr;gap:32px;padding:32px 16px}
  .hero-text h1{font-size:60px}
  .modal-inner{grid-template-columns:1fr}
  .modal-img{display:none}
  .cart-drawer{width:100%}
  .section{padding:32px 16px}
  .header-inner{padding:0 16px;gap:12px}
}
@media(max-width:480px){
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a class="logo" href="#"><span>THE </span>GOADED GOOSE</a>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search cards, sets, types…" autocomplete="off">
    </div>
    <div class="header-right">
      <button class="cart-btn" onclick="openCart()">
        🛒 Cart <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<!-- HERO -->
<div class="section" style="padding-top:48px;padding-bottom:48px;border-bottom:1px solid var(--line)">
  <div class="hero" style="max-width:100%;padding:0;border:none">
    <div class="hero-text">
      <h1>MTG SINGLES<em>CANADA</em></h1>
      <p>Curated singles. Real prices. Ships from Toronto. No fluff, just the cards you need.</p>
      <div class="hero-actions">
        <button class="btn-primary" onclick="document.getElementById('catalogSection').scrollIntoView({behavior:'smooth'})">Browse Inventory</button>
        <button class="btn-ghost" onclick="setActiveSet(null)">View All Sets</button>
      </div>
    </div>
    <div class="hero-stats" id="heroStats">
      <div class="hero-stat"><div class="hero-stat-num" id="statCards">—</div><div class="hero-stat-label">Cards Listed</div></div>
      <div class="hero-stat"><div class="hero-stat-num" id="statSets">—</div><div class="hero-stat-label">Sets</div></div>
      <div class="hero-stat"><div class="hero-stat-num" id="statUnder1">—</div><div class="hero-stat-label">Under $1 CAD</div></div>
    </div>
  </div>
</div>

<!-- SETS -->
<div class="section" id="setsSection">
  <div class="section-header">
    <span class="section-title">Browse by Set</span>
    <a class="see-all" onclick="setActiveSet(null)">All</a>
  </div>
  <div class="set-grid" id="setGrid"></div>
</div>

<!-- CATALOG -->
<div class="section" id="catalogSection">
  <div class="section-header">
    <span class="section-title" id="catalogTitle">All Cards</span>
    <span class="section-sub" id="catalogSub"></span>
  </div>

  <div class="filter-bar">
    <div class="filter-group" id="rarityFilters">
      <button class="filter-chip active" data-rarity="all" onclick="setRarity('all',this)">All</button>
      <button class="filter-chip" data-rarity="mythic" onclick="setRarity('mythic',this)">Mythic</button>
      <button class="filter-chip" data-rarity="rare" onclick="setRarity('rare',this)">Rare</button>
      <button class="filter-chip" data-rarity="uncommon" onclick="setRarity('uncommon',this)">Uncommon</button>
      <button class="filter-chip" data-rarity="common" onclick="setRarity('common',this)">Common</button>
    </div>
    <select class="filter-select" id="colorFilter" onchange="applyFilters()">
      <option value="">Any Color</option>
      <option value="W">White</option>
      <option value="U">Blue</option>
      <option value="B">Black</option>
      <option value="R">Red</option>
      <option value="G">Green</option>
      <option value="C">Colorless</option>
    </select>
    <select class="filter-select" id="sortFilter" onchange="applyFilters()">
      <option value="name">Name A–Z</option>
      <option value="price_asc">Price: Low–High</option>
      <option value="price_desc">Price: High–Low</option>
      <option value="added">Recently Added</option>
    </select>
    <span class="results-count" id="resultsCount"></span>
  </div>

  <div class="card-grid" id="cardGrid"></div>
  <div class="load-wrap" id="loadWrap" style="display:none">
    <button class="btn-ghost" onclick="loadMore()">Load More</button>
  </div>
  <div class="no-results" id="noResults" style="display:none">
    <h3>Nothing Found</h3>
    <p>Try a different search or filter</p>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="e=>e.target===this&&closeModal()">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-inner">
      <div class="modal-img"><img id="modalImg" src="" alt=""></div>
      <div class="modal-details">
        <div class="modal-set" id="modalSet"></div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-type" id="modalType"></div>
        <div class="modal-price-row">
          <div>
            <div class="modal-price-label">Price (CAD)</div>
            <div class="modal-price" id="modalPrice"></div>
          </div>
          <div>
            <div class="modal-price-label">Stock</div>
            <div class="modal-price" id="modalQty" style="color:var(--white2)"></div>
          </div>
        </div>
        <div class="modal-meta">
          <div class="meta-item"><label>Condition</label><span id="modalCond"></span></div>
          <div class="meta-item"><label>Rarity</label><span id="modalRar"></span></div>
          <div class="meta-item"><label>Set</label><span id="modalSetFull"></span></div>
          <div class="meta-item"><label>Number</label><span id="modalNum"></span></div>
        </div>
        <div class="modal-formats">
          <label>Legal In</label>
          <div class="format-chips" id="modalFormats"></div>
        </div>
        <div class="modal-actions">
          <div class="qty-control">
            <button onclick="changeQty(-1)">−</button>
            <span id="modalQtyInput">1</span>
            <button onclick="changeQty(1)">+</button>
          </div>
          <button class="modal-add" onclick="addFromModal()">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-head">
    <h2>Your Cart</h2>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot" id="cartFoot" style="display:none">
    <div class="cart-total-row">
      <span class="cart-total-label">Subtotal (CAD)</span>
      <span class="cart-total-num" id="cartTotal">$0.00</span>
    </div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const DB_URL='https://raw.githubusercontent.com/Bchilled/goaded-goose/main/database.json';
const CAD=1.37;
const PAGE_SIZE=48;

let allCards=[];
let filtered=[];
let activeSet=null;
let activeRarity='all';
let cart={};
let modalCard=null;
let modalQty=1;
let page=1;

const SET_NAMES={
  ECL:'Lorwyn Eclipsed',MH1:'Modern Horizons',MH2:'Modern Horizons 2',
  M15:'Magic 2015',THB:'Theros Beyond Death',TSR:'Time Spiral Remastered',
  VOW:'Innistrad: Crimson Vow',WAR:'War of the Spark',
  TMT:'The Modern Tournament',TLA:'Tarkir: Dragonstorm'
};

async function init(){
  try{
    const r=await fetch(DB_URL);
    allCards=await r.json();
    buildStats();
    buildSets();
    applyFilters();
  }catch(e){
    document.getElementById('cardGrid').innerHTML='<p style="color:var(--muted);padding:40px">Could not load card database.</p>';
  }
}

function usd2cad(u){return u*CAD}
function fmtCad(u){return'$'+(usd2cad(u)).toFixed(2)}

function buildStats(){
  document.getElementById('statCards').textContent=allCards.length.toLocaleString();
  const sets=new Set(allCards.map(c=>c.set));
  document.getElementById('statSets').textContent=sets.size;
  const under=allCards.filter(c=>usd2cad(c.usd)<1).length;
  document.getElementById('statUnder1').textContent=under.toLocaleString();
}

function buildSets(){
  const counts={};
  allCards.forEach(c=>counts[c.set]=(counts[c.set]||0)+1);
  const sets=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const grid=document.getElementById('setGrid');
  grid.innerHTML=sets.map(([code,cnt])=>`
    <div class="set-chip" onclick="setActiveSet('${code}')" id="set_${code}">
      <div class="set-code">${code}</div>
      <div class="set-name">${SET_NAMES[code]||code}</div>
      <div class="set-count">${cnt} cards</div>
    </div>`).join('');
}

function setActiveSet(code){
  activeSet=code;
  document.querySelectorAll('.set-chip').forEach(el=>el.classList.remove('active'));
  if(code){document.getElementById('set_'+code)?.classList.add('active')}
  page=1;
  applyFilters();
  document.getElementById('catalogSection').scrollIntoView({behavior:'smooth'});
}

function setRarity(r,el){
  activeRarity=r;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  page=1;
  applyFilters();
}

function applyFilters(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  const color=document.getElementById('colorFilter').value;
  const sort=document.getElementById('sortFilter').value;

  filtered=allCards.filter(c=>{
    if(activeSet&&c.set!==activeSet)return false;
    if(activeRarity!=='all'&&c.rar!==activeRarity)return false;
    if(color&&!(c.colors||[]).includes(color))return false;
    if(q&&!c.name.toLowerCase().includes(q)&&!(c.set||'').toLowerCase().includes(q)&&!(c.type||'').toLowerCase().includes(q))return false;
    return true;
  });

  if(sort==='price_asc')filtered.sort((a,b)=>a.usd-b.usd);
  else if(sort==='price_desc')filtered.sort((a,b)=>b.usd-a.usd);
  else if(sort==='added')filtered.sort((a,b)=>new Date(b.added||0)-new Date(a.added||0));
  else filtered.sort((a,b)=>a.name.localeCompare(b.name));

  const title=activeSet?(SET_NAMES[activeSet]||activeSet):'All Cards';
  document.getElementById('catalogTitle').textContent=title;
  document.getElementById('catalogSub').textContent='';
  document.getElementById('resultsCount').textContent=filtered.length+' results';

  renderCards(1);
}

function renderCards(p){
  page=p;
  const grid=document.getElementById('cardGrid');
  const slice=filtered.slice(0,p*PAGE_SIZE);
  grid.innerHTML=slice.map(cardHTML).join('');
  document.getElementById('noResults').style.display=filtered.length?'none':'block';
  document.getElementById('loadWrap').style.display=filtered.length>slice.length?'block':'none';
}

function loadMore(){
  renderCards(page+1);
}

function cardHTML(c){
  const price=fmtCad(c.usd);
  const rar=c.rar||'common';
  return`<div class="card" onclick="openModal(${JSON.stringify(c).replace(/"/g,'&quot;')})">
    <div class="card-img-wrap">
      ${c.img?`<img src="${c.img}" alt="${c.name}" loading="lazy">`:`<div class="card-img-placeholder">🃏</div>`}
      <span class="card-badge badge-${rar}">${rar[0].toUpperCase()+rar.slice(1)}</span>
      ${c.foil?`<span class="card-foil-badge">✦ Foil</span>`:''}
    </div>
    <div class="card-body">
      <div class="card-set">${c.set} · #${c.num}</div>
      <div class="card-name" title="${c.name}">${c.name}</div>
      <div class="card-type">${c.type||''}</div>
      <div class="card-footer">
        <div class="card-price">${price}<span> CAD</span></div>
        <button class="add-btn" onclick="event.stopPropagation();quickAdd(${JSON.stringify(c).replace(/"/g,'&quot;')})" title="Add to cart">+</button>
      </div>
    </div>
  </div>`;
}

function openModal(c){
  modalCard=c;
  modalQty=1;
  document.getElementById('modalImg').src=c.img||'';
  document.getElementById('modalSet').textContent=`${c.set} · #${c.num}`;
  document.getElementById('modalName').textContent=c.name;
  document.getElementById('modalType').textContent=c.type||'';
  document.getElementById('modalPrice').textContent=fmtCad(c.usd)+' CAD';
  document.getElementById('modalQty').textContent=c.qty+' in stock';
  document.getElementById('modalCond').textContent=c.cond||'LP';
  document.getElementById('modalRar').textContent=(c.rar||'common')[0].toUpperCase()+(c.rar||'common').slice(1);
  document.getElementById('modalSetFull').textContent=SET_NAMES[c.set]||c.set;
  document.getElementById('modalNum').textContent='#'+c.num;
  document.getElementById('modalQtyInput').textContent=1;
  const leg=c.leg||{};
  const formats=Object.entries(leg).filter(([k,v])=>v).map(([k])=>`<span class="format-chip">${k[0].toUpperCase()+k.slice(1)}</span>`).join('');
  document.getElementById('modalFormats').innerHTML=formats||'<span style="color:var(--muted);font-size:12px">Not legal in any format</span>';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});

function changeQty(d){
  modalQty=Math.max(1,modalQty+d);
  document.getElementById('modalQtyInput').textContent=modalQty;
}

function addFromModal(){
  if(!modalCard)return;
  addToCart(modalCard,modalQty);
  closeModal();
}

function quickAdd(c){
  addToCart(c,1);
}

function addToCart(c,qty){
  const key=c.set+'_'+c.num+(c.foil?'_f':'');
  if(cart[key]){cart[key].qty+=qty}else{cart[key]={...c,qty}}
  updateCartUI();
  showToast(`${c.name} added to cart`);
}

function updateCartUI(){
  const total=Object.values(cart).reduce((s,c)=>s+c.qty,0);
  document.getElementById('cartCount').textContent=total;
  renderCart();
}

function renderCart(){
  const items=Object.values(cart);
  const el=document.getElementById('cartItems');
  const foot=document.getElementById('cartFoot');
  if(!items.length){
    el.innerHTML=`<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Your cart is empty</p></div>`;
    foot.style.display='none';return;
  }
  el.innerHTML=items.map(c=>`
    <div class="cart-item">
      ${c.img?`<img class="cart-item-img" src="${c.img}" alt="${c.name}">`:'<div class="cart-item-img"></div>'}
      <div class="cart-item-info">
        <div class="cart-item-name">${c.name}</div>
        <div class="cart-item-set">${c.set} #${c.num}${c.foil?' · Foil':''}</div>
        <div class="cart-item-row">
          <span class="cart-item-price">${fmtCad(c.usd*c.qty)} CAD <span style="font-size:12px;color:var(--muted);font-family:'DM Sans';font-weight:300">×${c.qty}</span></span>
          <button class="cart-item-remove" onclick="removeFromCart('${c.set}_${c.num}${c.foil?'_f':''}')">✕</button>
        </div>
      </div>
    </div>`).join('');
  const subtotal=items.reduce((s,c)=>s+usd2cad(c.usd)*c.qty,0);
  document.getElementById('cartTotal').textContent='$'+subtotal.toFixed(2);
  foot.style.display='block';
}

function removeFromCart(key){
  delete cart[key];
  updateCartUI();
}

function openCart(){
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeCart(){
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
  document.body.style.overflow='';
}

function checkout(){
  const items=Object.values(cart);
  if(!items.length)return;
  const subject=encodeURIComponent('Order from The Goaded Goose');
  const body=encodeURIComponent(
    'Hi, I would like to order the following cards:\n\n'+
    items.map(c=>`${c.qty}x ${c.name} (${c.set} #${c.num}${c.foil?' Foil':''}) - ${fmtCad(c.usd*c.qty)} CAD`).join('\n')+
    '\n\nSubtotal: $'+items.reduce((s,c)=>s+usd2cad(c.usd)*c.qty,0).toFixed(2)+' CAD'
  );
  window.location.href=`mailto:brentlysnow@gmail.com?subject=${subject}&body=${body}`;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.getElementById('searchInput').addEventListener('input',()=>{page=1;applyFilters()});

init();
</script>
</body>
</html>
