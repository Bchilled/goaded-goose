<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goaded Goose</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:#06080c;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif}
    input{background:transparent;border:1px solid #e8b84a;color:#e8b84a;padding:.7rem 1.2rem;font-size:1.2rem;text-align:center;outline:none;letter-spacing:.3em}
  </style>
</head>
<body>
  <input type="password" id="pw" placeholder="·····" autofocus>
  <script>
    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      if (this.value === 'BEN') {
        window.location.href = 'https://bchilled.github.io/goaded-goose';
      } else {
        this.value = '';
        this.style.borderColor = '#f00';
        setTimeout(() => this.style.borderColor = '#e8b84a', 800);
      }
    });
  </script>
</body>
</html>
